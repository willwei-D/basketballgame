<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .digital-noise {
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.02;
      pointer-events: none;
    }
    .flicker-text {
      animation: flicker 3s infinite;
    }
    @keyframes flicker {
      0%, 19.999%, 22%, 62.999%, 64%, 64.999%, 70%, 100% { opacity: 1; }
      20%, 21.999%, 63%, 63.999%, 65%, 69.999% { opacity: 0.7; }
    }
    .skew-header {
      transform: skewX(-12deg);
    }
    .orb-glow {
      box-shadow: 0 0 60px 10px rgba(222, 26, 88, 0.4), inset 0 0 40px rgba(143, 1, 119, 0.6);
    }
    .ring-rotate {
      border: 2px solid transparent;
      border-top-color: #DE1A58;
      border-bottom-color: #8F0177;
    }
    @keyframes fire-trail {
      0% { transform: translateX(-100%) skewX(-20deg); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translateX(200%) skewX(-20deg); opacity: 0; }
    }
    .fire-trail-effect {
      animation: fire-trail 1.5s infinite linear;
      background: linear-gradient(90deg, transparent, #F67D31, #FFFFFF, #F67D31, transparent);
    }
    @keyframes lightning-flicker {
      0%, 100% { opacity: 0.2; }
      10%, 12% { opacity: 1; }
      11% { opacity: 0.8; }
      13% { opacity: 0.2; }
      80%, 82% { opacity: 0.9; }
    }
    .lightning-effect {
      background-image: linear-gradient(45deg, transparent 45%, #FFFFFF 50%, transparent 55%);
      background-size: 20px 20px;
      animation: lightning-flicker 2s infinite;
    }
    @keyframes particle-flow {
      0% { background-position: 0% 0%; }
      100% { background-position: 100% 0%; }
    }
    .particle-effect {
      background-image: radial-gradient(circle, #FFFFFF 1px, transparent 1px);
      background-size: 8px 8px;
      animation: particle-flow 4s infinite linear;
    }
    @keyframes shimmer {
      100% { transform: translateX(500%); }
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface font-body text-on-surface overflow-hidden selection:bg-primary selection:text-on-primary">
<div class="fixed inset-0 digital-noise z-[100]"></div>
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-[#050044] bg-opacity-90 backdrop-blur-xl">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#DE1A58] text-2xl">grid_view</span>
<h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-b from-white via-slate-400 to-white drop-shadow-[0_0_8px_rgba(222,26,88,0.5)] font-headline italic -skew-x-12 uppercase tracking-tighter">
        NEON_CORE_v1.0
      </h1>
</div>
<div class="flex gap-8">
<span class="font-headline italic -skew-x-12 uppercase tracking-tighter text-[#DE1A58] drop-shadow-[0_0_5px_#DE1A58] text-sm cursor-pointer hover:skew-x-[-12deg] hover:text-white transition-all duration-75">DATA_STREAM</span>
<span class="font-headline italic -skew-x-12 uppercase tracking-tighter text-slate-500 opacity-70 text-sm cursor-pointer hover:skew-x-[-12deg] hover:text-white transition-all duration-75">LINK_SESSIONS</span>
</div>
<div class="bg-gradient-to-r from-[#DE1A58] to-transparent h-[1px] w-full opacity-50 absolute bottom-0 left-0"></div>
</header>
<main class="relative h-screen w-screen flex flex-col items-center justify-center p-8 pt-24 overflow-hidden">
<!-- Background Grid -->
<div class="absolute inset-0 z-0 opacity-10 pointer-events-none" style="background-image: linear-gradient(to right, #3631b8 1px, transparent 1px), linear-gradient(to bottom, #3631b8 1px, transparent 1px); background-size: 40px 40px;"></div>
<!-- Layout Grid: 3x3 HUD -->
<div class="relative z-10 w-full max-w-6xl h-full grid grid-cols-12 gap-8 items-center">
<!-- Rank Display (Left/Top) -->
<div class="col-span-12 lg:col-span-4 flex flex-col items-center lg:items-start relative">
<div class="absolute -top-12 -left-8 text-tertiary font-headline text-xs tracking-[0.4em] opacity-50 uppercase">CLASSIFICATION_SYNC</div>
<div class="relative group">
<div class="absolute inset-0 bg-primary blur-3xl opacity-20 group-hover:opacity-40 transition-opacity"></div>
<span class="text-[18rem] leading-none font-black italic -skew-x-12 text-transparent bg-clip-text bg-gradient-to-b from-white via-primary to-primary-container drop-shadow-[0_15px_30px_rgba(222,26,88,0.8)] filter brightness-125 flicker-text">S</span>
<div class="absolute bottom-12 right-0 bg-tertiary text-on-tertiary px-4 py-1 font-headline italic -skew-x-6 font-bold text-xl tracking-tighter drop-shadow-lg">MASTER_RANK</div>
</div>
</div>
<!-- Center Orb -->
<div class="col-span-12 lg:col-span-4 flex justify-center items-center relative h-full">
<!-- Rotating Rings -->
<div class="absolute w-[400px] h-[400px] rounded-full border border-outline-variant/20 animate-[spin_10s_linear_infinite]"></div>
<div class="absolute w-[360px] h-[360px] rounded-full ring-rotate animate-[spin_3s_linear_infinite]"></div>
<div class="absolute w-[320px] h-[320px] rounded-full ring-rotate animate-[spin_5s_linear_infinite_reverse] opacity-50"></div>

<div class="absolute inset-0 flex flex-col items-center justify-center">

<div class="flex flex-col gap-1.5">
<div class="flex justify-between font-headline italic text-xs tracking-widest text-[#F67D31]">

</div>
</div>
</div>
<!-- Stat Bar: BLOCKS (BLK) -->

<div class="flex justify-between font-headline italic text-xs tracking-widest text-[#DE1A58]">

<span>08</span>
</div>
<div class="h-6 bg-surface-container-highest relative overflow-hidden border-r-4 border-[#DE1A58]">

<nav class="flex flex-col gap-4">

</div>
